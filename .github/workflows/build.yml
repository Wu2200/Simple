name: Build iOS IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build App
      run: |
        xcodebuild -project SimpleBrowser.xcodeproj \
          -scheme SimpleBrowser \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath ./build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          build

    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/SimpleBrowser.app Payload/
        zip -r SimpleBrowser.ipa Payload

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SimpleBrowser-IPA
        path: SimpleBrowser.ipa
