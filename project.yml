name: SimpleBrowser

options:
  bundleIdPrefix: com.example
  xcodeVersion: "15.0"

targets:
  SimpleBrowser:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: App.swift
      - path: Resources
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SimpleBrowser
        PRODUCT_NAME: SimpleBrowser
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        ENABLE_PREVIEWS: NO
